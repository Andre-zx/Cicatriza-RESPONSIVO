<!DOCTYPE html>
<html lang="pt-BR" class="pagina-login">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cicatriza+ - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="mobile.css">
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>

    <main class="login-container">
        <div class="logo-header">
            <div class="logo-icon">
                <img src="img/Logo.svg"/> 
            </div>
            <p class="subtitle">Sistema de gestão de feridas</p>
        </div>

        <form class="login-form">
            <div class="input-group">
                <label for="cpf">CPF</label>
                <input type="text" inputmode="numeric" id="cpf" placeholder="000.000.000-00" maxlength="14" required>
            </div>

            <div class="input-group">
                <label for="senha">SENHA</label>
                <input type="password" id="senha" placeholder="••••••••" required>
            </div>

            <div class="forgot-password">
                <a href="#">Esqueceu a senha?</a>
            </div>

            <button type="submit" class="btn btn-primary">
                <a href="paginainicial.html">
                    Entrar no sistema
                </a>
            </button>

            <button type="button" class="btn btn-secondary">
                <a href="cadastro.html">
                    Criar nova conta
                </a>
            </button>
        </form>

        <footer class="form-footer">
            <p>Acesso exclusivo para profissionais de saúde</p>
        </footer>
    </main>

</body>
</html>
