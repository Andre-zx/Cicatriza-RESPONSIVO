<!DOCTYPE html>
<html lang="pt-BR" class="pagina-cadastro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cicatriza+ - Criar Conta</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="mobile.css">
    
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body class="pagina-cadastro">

    <main class="register-container">
        <header class="register-header"> 
            <div class="user-icon-badge">
               <img src="img/Logo.svg" alt="Logo Cicatriza" class="logo-img">
            </div>
            <h2>Criar conta</h2>
            <p class="subtitle">Preencha seus dados de profissional</p>
        </header>

        <form class="register-form">
            
            <div class="input-group full-width">
                <label for="nome">NOME COMPLETO</label>
                <input type="text" id="nome" placeholder="Digite seu nome completo" required>
            </div>

            <div class="form-row">
                <div class="input-group">
                    <label for="cpf">CPF</label>
                    <input type="text" inputmode="numeric" id="cpf" placeholder="000.000.000-00" required>
                </div>
                <div class="input-group">
                    <label for="nascimento">DATA DE NASCIMENTO</label>
                    <input type="date" id="nascimento" placeholder="DD/MM/AAAA" required>
                </div>
            </div>
            <div class="form-row">
                <div class="input-group">
                    <label for="email">E-MAIL</label>
                    <input type="email" id="email" placeholder="Exemplo@gmail.com" required>
                </div>
                <div class="input-group">
                    <label for="telefone">TELEFONE</label>
                    <input type="tel" id="telefone" placeholder="(00) 00000-0000" maxlength="14" required>
                </div>
            </div>
            <div class="input-group full-width">
                <label for="coren">REGISTRO PROFISSIONAL (COREN)</label>
                <input type="text" id="coren" placeholder="Digite seu número do COREN" required>
            </div>
            <div class="form-row">
                <div class="input-group">
                    <label for="senha">SENHA</label>
                    <input type="password" id="senha" placeholder="Digite sua senha" required>
                </div>
                <div class="input-group">
                    <label for="confirmar-senha">CONFIRMAR SENHA</label>
                    <input type="password" id="confirmar-senha" placeholder="Repita sua senha" required>
                </div>
            </div>

            <div class="info-box">
                <p>A confirmação de e-mail será enviada após o cadastro</p>
            </div>

            <button type="submit" class="btn-submit" onclick="window.location.href='paginainicial.html'">
                Concluir cadastro
            </button>
        </form>

        <footer class="register-footer">
            <p>Já tem conta? <a href="login.html">Entrar</a></p>
        </footer>
    </main>

</body>
</html>
