         <!-- CONTEÚDO -->
    <main class="content">

        <section class="page-header">

            <a href="#" class="action-card">

                <img src="img/User.png" alt="Cadastrar paciente">

                <div>
                    <h1>Cadastrar paciente</h1>
                    <p>
                        Registre um novo paciente e inicie o
                        acompanhamento de feridas
                    </p>
                </div>


            </a>

        </section>

        <form class="patient-form">
           
            <div class="grid1">
            <div class="field double">
                <label>Nome completo</label>
                <input type="text" placeholder="Digite seu nome completo">
            </div>

            <div class="field double">
                <label>Leito</label>
                <input type="text" placeholder="Ex: 12-A">
            </div>

            <div class="field">
                <label>Natural de</label>
                <input type="text" placeholder="Ex: São Paulo">
            </div>

            <div class="field double">
                <label>Endereço</label>
                <input type="text" placeholder="Rua, número, bairro">
            </div>
             
            <div class="field">
                <label>CEP</label>
                <input type="text" placeholder="00000-000">
            </div>

            <div class="field double">
                <label>E-mail</label>
                <input type="email" placeholder="Exemplo@gmail.com">
            </div>

            <div class="field">
                <label>Telefone/Whatsapp</label>
                <input type="text" placeholder="Ex: (61)99999-9999">
            </div>

            <div class="field">
                <label>Prontuário</label>
                <input type="text" placeholder="N° do prontuário">
            </div>

            </div>

            <div class="grid2">

            <div class="field">
                <label for="data-cadastro">Data do cadastro</label>
                <input id="data-cadastro" type="date">
            </div>

            <div class="field">
                <label for="nascimento">Nascimento</label>
                <input id="nascimento" type="date">
            </div>

            <div class="field">
                <label for="numero-filhos">Número de filhos</label>
                <input id="numero-filhos" type="number" min="0" max="10" placeholder="0">
            </div>

             <div class="field">
                <label for="pessoas-residem">Pessoas que residem juntas</label>
                <input id="pessoas-residem" type="number" min="0" max="10" placeholder="0">
            </div>

            </div>

            <div class="grid3">

            <div class="field select">
                <label for="escolaridade">Escolaridade</label>
                <select id="escolaridade" name="escolaridade">
                    <option value="" selected disabled>Selecione</option>
                    <option value="educacaobasica">Educação Básica</option>
                    <option value="ensinomedio">Ensino Médio</option>
                    <option value="graduacao">Graduação</option>
                    <option value="posgraduacao">Pós-Graduação</option>
                    
                </select>
                
            </div>

            <div class="field select">
                <label for="genero">Gênero</label>
                <select id="genero" name="genero">
                    <option value="" selected disabled>Selecione</option>
                    <option value="masculino">Masculino (Homem)</option>
                    <option value="feminino">Feminino (Mulher)</option>
                    <option value="nao-binario">Não-binário</option>
                    <option value="lgbtqia+">LGBTQIA+ (Gay, Lésbica...)</option>
                    <option value="bissexual">Bissexual</option>
                    <option value="assexual">Assexual</option>
                    <option value="prefiro-nao-responder">Prefiro não responder</option>
                    <option value="outro">Outro</option>
                </select>
            </div>

            <div class="field select">
               <label for="moradia">Tipo de Moradia</label>
                <select id="moradia" name="moradia">
                    <option value="" selected disabled>Selecione</option>
                    <option value="alugado">Alugado</option>
                    <option value="financiado">Financiado</option>
                    <option value="proprio">Próprio</option>
                    <option value="cedido">Cedido</option>
                    <option value="outro">Outro</option>
                </select>
            </div>

            <div class="field select">
                <label for="estado-civil">Estado civil</label>
                <select id="estado-civil" name="estado-civil">
                    <option value="" selected disabled>Selecione</option>
                    <option value="solteiro">Solteiro(a)</option>
                    <option value="casado">Casado(a)</option>
                    <option value="divorciado">Divorciado(a)</option>
                    <option value="viuvo">Viúvo(a)</option>
                    <option value="separado">Separado(a)</option>
                    <option value="uniao-estavel">União estável</option>
                    <option value="outro">Outro</option>
                </select>
            </div>

            </div>

            <div class="grid4">
            
            <div class="field">
                <label>Renda familiar</label>
                <input type="text" placeholder="Ex: R$ 4.500,00">
            </div>

            <div class="field">
                <label>Ocupação</label>
                <input type="text" placeholder="Ex: Arquiteto">
            </div>

            <div class="field double">
                <label>Médico titular</label>
                <input type="text" placeholder="Ex: João da Silva Santos">
            </div>

            </div>

        </form>

        <section class="form-footer">

            <div class="stepper">

                <div class="step-line">
                    <span class="active"></span>
                </div>

                <div class="step-dots">
                    <span></span>
                    <span class="active"></span>
                </div>

            </div>

            <button type="button" class="btn-next" onclick="location.href='paciente.html'">
            CONTINUAR
            </button>
        </section>

    </main>

    </div>
